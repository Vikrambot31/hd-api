<title>Лунный календарь — Vikram</title>
<link rel="stylesheet" href="./styles.css">
<style>
/* ── Lunar page variables ── */
:root {
  --lc-good:    #15803d;
  --lc-good-bg: rgba(21,128,61,0.12);
  --lc-warn:    #b45309;
  --lc-warn-bg: rgba(180,83,9,0.12);
  --lc-bad:     #be123c;
  --lc-bad-bg:  rgba(190,18,60,0.12);
  --lc-card:    rgba(255,255,255,0.05);
  --lc-border:  rgba(255,255,255,0.10);
  --lc-purple:  #a78bfa;
  --lc-gold:    #fbbf24;
}

/* ── Page layout ── */
.lc-page { padding: 48px 0 80px; min-height: 100vh; }

/* Override body bg for lunar page */
body {
  background: url('./foto/central.png') center/cover no-repeat fixed;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: linear-gradient(90deg, rgba(0,0,0,0.82) 0%, rgba(13,8,32,0.88) 100%);
  z-index: 0;
  pointer-events: none;
}
.lc-page { position: relative; z-index: 1; }
.site-header { position: relative; z-index: 10; }
.lc-hero { text-align: center; margin-bottom: 48px; }
.lc-hero h1 { font-size: clamp(28px,5vw,48px); font-weight:700; color:#fff; margin:0 0 10px; }
.lc-hero p  { color:rgba(255,255,255,0.6); font-size:16px; margin:0; }

/* ── City selector ── */
.lc-controls {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  background: var(--lc-card); border: 1px solid var(--lc-border);
  border-radius: 16px; padding: 20px 24px; margin-bottom: 32px;
}
.lc-controls label { color: rgba(255,255,255,0.7); font-size:14px; white-space:nowrap; }
.lc-controls select {
  background: rgba(255,255,255,0.08); border: 1px solid var(--lc-border);
  border-radius: 10px; color:#fff; padding: 10px 16px; font-size:15px;
  cursor:pointer; outline:none; flex:1; min-width:180px;
}
.lc-controls select option { background:#1a1040; }
.lc-date-nav { display:flex; align-items:center; gap:12px; margin-left:auto; }
.lc-nav-btn {
  background: rgba(255,255,255,0.08); border: 1px solid var(--lc-border);
  border-radius:10px; color:#fff; width:40px; height:40px; font-size:18px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition: background .2s;
}
.lc-nav-btn:hover { background: rgba(167,139,250,0.2); }
.lc-date-display { color:#fff; font-size:15px; font-weight:500; min-width:160px; text-align:center; }

/* ── Day summary card ── */
.lc-summary {
  background: linear-gradient(135deg, rgba(109,40,217,0.2), rgba(139,43,226,0.1));
  border: 1px solid rgba(167,139,250,0.25);
  border-radius: 20px; padding: 28px 32px; margin-bottom: 24px;
}
.lc-summary-top { display:flex; align-items:center; gap:20px; flex-wrap:wrap; margin-bottom:20px; }
.lc-moon-icon { font-size:56px; line-height:1; }
.lc-summary-info h2 { color:#fff; font-size:22px; font-weight:700; margin:0 0 4px; }
.lc-summary-info .lc-subtitle { color: var(--lc-purple); font-size:14px; }
.lc-metrics { display:grid; grid-template-columns:repeat(auto-fit, minmax(130px,1fr)); gap:12px; }
.lc-metric { background:rgba(255,255,255,0.06); border-radius:12px; padding:14px 16px; }
.lc-metric-label { font-size:11px; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
.lc-metric-val { font-size:17px; font-weight:600; color:#fff; }
.lc-metric-val.good { color:#4ade80; }
.lc-metric-val.warn { color:#fbbf24; }
.lc-metric-val.bad  { color:#fb7185; }

/* ── Time blocks ── */
.lc-blocks-title { color:rgba(255,255,255,0.5); font-size:12px; letter-spacing:.1em; text-transform:uppercase; margin: 0 0 12px; }
.lc-block {
  border-left: 3px solid;
  border-radius: 0 14px 14px 0;
  padding: 16px 20px;
  margin-bottom: 10px;
}
.lc-block.good    { border-color: var(--lc-good); background: var(--lc-good-bg); }
.lc-block.neutral { border-color: var(--lc-warn); background: var(--lc-warn-bg); }
.lc-block.bad     { border-color: var(--lc-bad);  background: var(--lc-bad-bg);  }
.lc-block-time  { font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:4px; }
.lc-block-head  { font-size:15px; font-weight:600; color:#fff; margin-bottom:6px; }
.lc-block-text  { font-size:14px; color:rgba(255,255,255,0.7); line-height:1.65; margin-bottom:10px; }
.lc-tags { display:flex; gap:6px; flex-wrap:wrap; }
.lc-tag {
  font-size:11px; padding:3px 10px; border-radius:6px;
  background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.65);
  border: 1px solid rgba(255,255,255,0.1);
}

/* ── Lunar day full description ── */
.lc-day-card {
  background: var(--lc-card); border: 1px solid var(--lc-border);
  border-radius: 20px; padding: 28px 32px; margin-bottom: 24px;
}
.lc-day-card h3 { color: var(--lc-gold); font-size:20px; font-weight:700; margin:0 0 4px; }
.lc-day-card .lc-symbol { color:rgba(255,255,255,0.5); font-size:13px; margin-bottom:20px; }

.lc-sections { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:16px; }
.lc-section { background:rgba(255,255,255,0.04); border-radius:14px; padding:18px 20px; }
.lc-section-icon { font-size:22px; margin-bottom:8px; }
.lc-section h4 { color:#fff; font-size:14px; font-weight:600; margin:0 0 10px; }
.lc-section ul { margin:0; padding:0; list-style:none; }
.lc-section ul li {
  font-size:13px; color:rgba(255,255,255,0.7); padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,0.06); line-height:1.5;
}
.lc-section ul li:last-child { border-bottom:none; }
.lc-section ul li::before { content:'· '; color: var(--lc-purple); }

/* ── Zodiac section ── */
.lc-zodiac-card {
  background: var(--lc-card); border: 1px solid var(--lc-border);
  border-radius: 20px; padding: 28px 32px; margin-bottom: 24px;
}
.lc-zodiac-card h3 { color:#fff; font-size:18px; font-weight:600; margin:0 0 16px; }
.lc-zodiac-text { font-size:14px; color:rgba(255,255,255,0.7); line-height:1.7; margin-bottom:16px; }
.lc-zodiac-meta { display:flex; gap:10px; flex-wrap:wrap; }

/* ── Loading ── */
.lc-loading { text-align:center; color:rgba(255,255,255,0.4); padding:60px 0; font-size:15px; }

/* ── Responsive ── */
@media(max-width:600px){
  .lc-summary { padding:20px; }
  .lc-day-card { padding:20px; }
  .lc-controls { padding:16px; }
}
</style>

        <button class="lc-nav-btn" onclick="shiftDay(-1)">‹</button>
        <div class="lc-date-display" id="dateDisplay">—</div>
        <button class="lc-nav-btn" onclick="shiftDay(1)">›</button>
        <button class="lc-nav-btn" onclick="goToday()" title="Сегодня" style="width:auto;padding:0 12px;font-size:13px;">Сегодня</button>
      </div>
    </div>

    <!-- Output -->
    <div id="output"><div class="lc-loading">Загружаем данные…</div></div>

  </div>
</main>

// 3. ASTRONOMICAL CALCULATIONS

// Known new moon: Jan 6, 2000 18:14 UTC
const KNOWN_NEW_MOON = new Date(Date.UTC(2000, 0, 6, 18, 14, 0));
const LUNAR_CYCLE = 29.53058867; // days

function getLunarAge(date) {
  const diff = (date - KNOWN_NEW_MOON) / (1000 * 60 * 60 * 24);
  return ((diff % LUNAR_CYCLE) + LUNAR_CYCLE) % LUNAR_CYCLE;
}

function getLunarDay(date) {
  return Math.floor(getLunarAge(date)) + 1;
}

function getLunarPhase(age) {
  const pct = age / LUNAR_CYCLE;
  if (pct < 0.03 || pct >= 0.97) return { name: 'Новолуние', icon: '🌑', key: 'new' };
  if (pct < 0.22) return { name: 'Растущий серп', icon: '🌒', key: 'waxing_crescent' };
  if (pct < 0.28) return { name: 'Первая четверть', icon: '🌓', key: 'first_quarter' };
  if (pct < 0.47) return { name: 'Растущая луна', icon: '🌔', key: 'waxing_gibbous' };
  if (pct < 0.53) return { name: 'Полнолуние', icon: '🌕', key: 'full' };
  if (pct < 0.72) return { name: 'Убывающая луна', icon: '🌖', key: 'waning_gibbous' };
  if (pct < 0.78) return { name: 'Последняя четверть', icon: '🌗', key: 'last_quarter' };
  return { name: 'Убывающий серп', icon: '🌘', key: 'waning_crescent' };
}

// Moon's ecliptic longitude (approximate, ±1-2°)
function getMoonZodiac(date) {
  const jd = (date - new Date(Date.UTC(2000,0,1,12))) / 86400000 + 2451545.0;
  const L = (218.316 + 13.176396 * (jd - 2451545.0)) % 360;
  const M = (134.963 + 13.064993 * (jd - 2451545.0)) % 360;
  const Mr = M * Math.PI / 180;
  const lon = (L + 6.289 * Math.sin(Mr)) % 360;
  const normalized = (lon + 360) % 360;
  return Math.floor(normalized / 30);
}

// Time when lunar day changes (find new moon before date, add days)
function getLunarDayStart(date, utcOffset) {
  const age = getLunarAge(date);
  const dayNum = Math.floor(age);
  const msPerDay = 86400000;
  const newMoonMs = date.getTime() - age * msPerDay;
  const dayStart = new Date(newMoonMs + dayNum * msPerDay);
  return dayStart;
}

// Time when zodiac changes (approximate: find when longitude crosses 30° boundary)
function getZodiacChangeTime(date, currentSign, utcOffset) {
  const msPerDay = 86400000;
  const moonSpeed = msPerDay * LUNAR_CYCLE / 360; // ms per degree
  const lon = ((218.316 + 13.176396 * ((date - new Date(Date.UTC(2000,0,1,12))) / 86400000)) % 360 + 360) % 360;
  const nextBoundary = (currentSign + 1) * 30;
  const degreesLeft = ((nextBoundary - lon) + 360) % 30;
  return new Date(date.getTime() + degreesLeft * moonSpeed);
}

let currentDate = new Date();
currentDate.setHours(12, 0, 0, 0);

function shiftDay(d) {
  currentDate = new Date(currentDate.getTime() + d * 86400000);
  render();
}
function goToday() {
  currentDate = new Date();
  currentDate.setHours(12, 0, 0, 0);
  render();
}

function fmt(h, m) {
  return (h < 10 ? '0' + h : h) + ':' + (m < 10 ? '0' + m : m);
}

function fmtDate(d) {
  const days = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return days[d.getDay()] + ', ' + d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
}

function ratingLabel(r) {
  if (r === 'good') return { cls: 'good', text: '✦ Благоприятный' };
  if (r === 'bad')  return { cls: 'bad',  text: '✖ Неблагоприятный' };
  return { cls: 'warn', text: '◈ Нейтральный' };
}

function render() {
  const utcOffset = parseInt(document.getElementById('citySelect').value);
  const d = currentDate;

  // Local midnight for chosen city
  const localMidnight = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate(), -utcOffset, 0, 0));
  const localNoon     = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate(), 12 - utcOffset, 0, 0));

  // Lunar data at noon
  const age    = getLunarAge(localNoon);
  const lunarDay   = getLunarDay(localNoon);
  const phase  = getLunarPhase(age);
  const zodiac = getMoonZodiac(localNoon);
  const zInfo  = ZODIAC[zodiac] || ZODIAC[0];

  // Lunar day start time in local tz
  const dayStartUTC = getLunarDayStart(localNoon, utcOffset);
  const dayStartLocal = new Date(dayStartUTC.getTime() + utcOffset * 3600000);
  const dayStartH = dayStartLocal.getUTCHours();
  const dayStartM = dayStartLocal.getUTCMinutes();

  // Check if zodiac changes during this day
  const zodiacAtStart = getMoonZodiac(localMidnight);
  const zodiacAtEnd   = getMoonZodiac(new Date(localMidnight.getTime() + 86400000 - 1000));
  const zodiacChanges = zodiacAtStart !== zodiacAtEnd;
  let zodiacChangeTimeStr = '';

    // Approximate change time
    const changeUTC = getZodiacChangeTime(localMidnight, zodiacAtStart, utcOffset);

    zodiacChangeTimeStr = fmt(changeLocal.getUTCHours(), changeLocal.getUTCMinutes());
  }

  const dayData = LUNAR_DAYS[safe_ld];
  const rating  = ratingLabel(dayData.rating);

  document.getElementById('dateDisplay').textContent = fmtDate(d);

  // Build blocks
  const blocks = [];

  if (dayStartH > 0) {
    // Previous lunar day before change

      time: `с 00:00 до ${fmt(dayStartH, dayStartM)} — ${ZODIAC[zodiacAtStart].icon} ${ZODIAC[zodiacAtStart].name}, ${prevLD}-й лунный день`,

      cls: prevData.rating
    });
  }

  // Main block

    ? `с ${fmt(dayStartH, dayStartM)}` + (zodiacChanges && !zodiacChangeTimeStr ? '' : '')

    blocks.push({
      time: `${mainTime} — ${zInfo.icon} ${zInfo.name}, ${safe_ld}-й лунный день`,
      head: `${zInfo.name}, ${safe_ld}-й лунный день (${dayData.name})`,
      text: zInfo.text,
      tags: [`Символ: ${dayData.name}`, `Стихия: ${zInfo.element}`, `Планета: ${zInfo.planet}`, `Фаза: ${phase.name}`],
      cls: dayData.rating
    });
  } else {
    blocks.push({
      time: `${mainTime} до ${zodiacChangeTimeStr} — ${ZODIAC[zodiacAtStart].icon} ${ZODIAC[zodiacAtStart].name}`,
      head: `${ZODIAC[zodiacAtStart].name}, ${safe_ld}-й лунный день (${dayData.name})`,
      text: ZODIAC[zodiacAtStart].text,
      tags: [`Символ: ${dayData.name}`, `Стихия: ${ZODIAC[zodiacAtStart].element}`, `Планета: ${ZODIAC[zodiacAtStart].planet}`],
      cls: dayData.rating
    });
    blocks.push({
      time: `с ${zodiacChangeTimeStr} — ${ZODIAC[zodiacAtEnd].icon} ${ZODIAC[zodiacAtEnd].name} (смена знака)`,
      head: `Луна переходит в ${ZODIAC[zodiacAtEnd].name}`,
      text: ZODIAC[zodiacAtEnd].text,
      tags: [`Стихия: ${ZODIAC[zodiacAtEnd].element}`, `Планета: ${ZODIAC[zodiacAtEnd].planet}`],
      cls: dayData.rating
    });
  }

  // Generate sections HTML
  function sectionHTML(icon, title, items) {
    return `<div class="lc-section">
      <div class="lc-section-icon">${icon}</div>
      <h4>${title}</h4>
      <ul>${items.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>`;
  }

  const sectionsHTML = `
    <div class="lc-sections">
      ${sectionHTML('💰', 'Деньги и работа', dayData.money)}
      ${sectionHTML('🌿', 'Здоровье', dayData.health)}
      ${sectionHTML('💭', 'Эмоции', dayData.emotions)}
      ${sectionHTML('⚠️', 'Опасности', dayData.dangers)}
      ${sectionHTML('❤️', 'Отношения', dayData.relations)}
    </div>`;

  const blocksHTML = blocks.map(b => `
    <div class="lc-block ${b.cls}">
      <div class="lc-block-time">${b.time}</div>
      <div class="lc-block-head">${b.head}</div>
      <div class="lc-block-text">${b.text}</div>
      <div class="lc-tags">${b.tags.map(t => `<span class="lc-tag">${t}</span>`).join('')}</div>
    </div>`).join('');

  document.getElementById('output').innerHTML = `

    <!-- SUMMARY -->
    <div class="lc-summary">
      <div class="lc-summary-top">
        <div class="lc-moon-icon">${phase.icon}</div>
        <div class="lc-summary-info">
          <h2>${safe_ld}-й лунный день — ${dayData.name}</h2>
          <div class="lc-subtitle">${phase.name} · ${zInfo.icon} Луна в ${zInfo.name}</div>
        </div>
      </div>
      <div class="lc-metrics">
        <div class="lc-metric">
          <div class="lc-metric-label">Лунный день</div>
          <div class="lc-metric-val">${safe_ld}-й</div>
        </div>
        <div class="lc-metric">
          <div class="lc-metric-label">Знак Луны</div>
          <div class="lc-metric-val">${zInfo.icon} ${zInfo.name}</div>
        </div>
        <div class="lc-metric">
          <div class="lc-metric-label">Фаза</div>
          <div class="lc-metric-val">${phase.name}</div>
        </div>
        <div class="lc-metric">
          <div class="lc-metric-label">Оценка дня</div>
          <div class="lc-metric-val ${rating.cls}">${rating.text}</div>
        </div>
        <div class="lc-metric">
          <div class="lc-metric-label">Стихия</div>
          <div class="lc-metric-val">${zInfo.element}</div>
        </div>
        <div class="lc-metric">
          <div class="lc-metric-label">Планета Луны</div>
          <div class="lc-metric-val">${zInfo.planet}</div>
        </div>
      </div>
    </div>

    <!-- TIME BLOCKS -->
    <p class="lc-blocks-title">Периоды дня</p>
    ${blocksHTML}

    <!-- LUNAR DAY DESCRIPTION -->
    <div class="lc-day-card">
      <h3>${safe_ld}-й лунный день — ${dayData.name}</h3>
      <div class="lc-symbol">${dayData.symbol}</div>
      ${sectionsHTML}
    </div>

    <!-- ZODIAC -->
    <div class="lc-zodiac-card">
      <h3>${zInfo.icon} Луна в ${zInfo.name}</h3>
      <div class="lc-zodiac-text">${zInfo.text}</div>
      <div class="lc-zodiac-meta">
        <span class="lc-tag">Стихия: ${zInfo.element}</span>
        <span class="lc-tag">Планета: ${zInfo.planet}</span>
        <span class="lc-tag">Фаза: ${phase.name}</span>
      </div>
    </div>

  `;
}

render();
</script>

</body>
</html>
