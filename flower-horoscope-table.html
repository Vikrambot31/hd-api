<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Цветочный гороскоп</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0b10;--surface:#15121a;--border:#2e2540;--accent:#c47e9e;--accent2:#7b5ea7;--gold:#d4a85a;--text:#e8dff0;--muted:#7a6e8a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Jost',sans-serif;font-weight:300;min-height:100vh;}
.hero{text-align:center;padding:60px 20px 40px;background:radial-gradient(ellipse 80% 60% at 50% 0%,#2a1a3e 0%,transparent 70%);border-bottom:1px solid var(--border);}
.hero::before{content:'✦ ✦ ✦';display:block;color:var(--gold);font-size:12px;letter-spacing:8px;margin-bottom:20px;opacity:0.6;}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:400;letter-spacing:2px;background:linear-gradient(135deg,var(--gold),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.subtitle{margin-top:12px;color:var(--muted);font-size:14px;letter-spacing:1px;}
.controls{max-width:900px;margin:30px auto 0;padding:0 20px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.search-box{position:relative;flex:1;min-width:220px;max-width:320px;}
.search-box input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 16px 10px 38px;border-radius:8px;font-family:'Jost',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.search-box input:focus{border-color:var(--accent);}
.search-box::before{content:'🔍';position:absolute;left:12px;top:9px;font-size:14px;}
.month-filter{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
.month-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .2s;font-family:'Jost',sans-serif;}
.month-btn:hover,.month-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(196,126,158,.1);}
.table-wrap{max-width:1000px;margin:40px auto 60px;padding:0 20px;}
table{width:100%;border-collapse:collapse;background:var(--surface);border-radius:12px;overflow:hidden;box-shadow:0 0 60px rgba(123,94,167,.15);}
thead tr{background:linear-gradient(135deg,#1e1530,#251830);border-bottom:2px solid var(--border);}
th{padding:16px 20px;text-align:left;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;letter-spacing:1px;color:var(--gold);}
th:nth-child(1){width:44px;text-align:center;}
tbody tr{border-bottom:1px solid rgba(46,37,64,.5);transition:background .15s;cursor:pointer;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(123,94,167,.08);}
tbody tr.hidden{display:none;}
td{padding:14px 20px;font-size:14px;vertical-align:middle;}
td:nth-child(1){text-align:center;color:var(--muted);font-size:12px;}
.flower-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px;}
.date-range{color:var(--muted);font-size:13px;}
.month-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;border:1px solid currentColor;opacity:.85;color:var(--accent);}
.count-info{text-align:center;color:var(--muted);font-size:13px;margin-top:16px;}
.count-info span{color:var(--accent);font-weight:500;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:#1a1425;border:1px solid var(--border);border-radius:16px;max-width:580px;width:100%;padding:36px;position:relative;box-shadow:0 0 80px rgba(196,126,158,.2);animation:mIn .2s ease;max-height:85vh;overflow-y:auto;}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(10px);}}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;transition:color .2s;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-emoji{font-size:48px;display:block;margin-bottom:12px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.modal-period{color:var(--muted);font-size:13px;margin-bottom:20px;}
.modal-desc{color:var(--text);font-size:15px;line-height:1.85;white-space:pre-line;}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:20px;}
.tag{background:rgba(123,94,167,.15);border:1px solid rgba(123,94,167,.3);color:#b09ed4;padding:3px 10px;border-radius:20px;font-size:12px;}
.loading{color:var(--muted);font-style:italic;font-size:14px;}
@media(max-width:680px){th:nth-child(4),td:nth-child(4){display:none;}th:nth-child(3),td:nth-child(3){display:none;}}
</style>
</head>
<body>

<div class="hero">
  <h1>Цветочный гороскоп</h1>
  <p class="subtitle">36 цветков · соответствие дате рождения · нажмите на строку</p>
  <div class="controls">
    <div class="search-box">
      <input type="text" id="search" placeholder="Поиск по цветку или дате…">
    </div>
    <div class="month-filter">
      <button class="month-btn active" data-m="">Все</button>
      <button class="month-btn" data-m="январь">Янв</button>
      <button class="month-btn" data-m="февраль">Фев</button>
      <button class="month-btn" data-m="март">Мар</button>
      <button class="month-btn" data-m="апрель">Апр</button>
      <button class="month-btn" data-m="май">Май</button>
      <button class="month-btn" data-m="июнь">Июн</button>
      <button class="month-btn" data-m="июль">Июл</button>
      <button class="month-btn" data-m="август">Авг</button>
      <button class="month-btn" data-m="сентябрь">Сен</button>
      <button class="month-btn" data-m="октябрь">Окт</button>
      <button class="month-btn" data-m="ноябрь">Ноя</button>
      <button class="month-btn" data-m="декабрь">Дек</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <span class="modal-emoji" id="mEmoji"></span>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-period" id="mPeriod"></div>
    <div class="modal-desc" id="mDesc"></div>
    <div class="modal-tags" id="mTags"></div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Цветок</th>
        <th>Период</th>
        <th>Месяц</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <p class="count-info">Показано: <span id="cnt">36</span> из 36</p>
</div>

• Отношение к помощи и ожидания от других
помогает бескорыстно и без условий — благородство не показное, а естественное. сам за помощью обращается крайне редко. от окружающих ожидает честности и соответствия базовым моральным нормам. двуличие и беспринципность воспринимает как личное оскорбление.`,

"Эдельвейс": `• Социальное поведение
свободолюбив и стремителен — не задерживается там, где стало скучно или тесно. пользуется любым шансом изменить свою жизнь, не задумываясь о последствиях. вызывает крайние реакции — им либо восхищаются, либо его не переносят. равнодушных почти нет.

• Имидж и самопрезентация
обладает редкой харизмой, которую невозможно сымитировать. выглядит как человек, живущий по собственным правилам. не подстраивается под чужие ожидания — и это одновременно притягивает и раздражает.

• Отношение к людям
широкие жесты, импульсивные решения, неожиданные поступки — всё это делает его непредсказуемым партнёром и другом. врагов и завистников много — именно потому что живёт ярко и не скрывает этого. но и преданных поклонников не меньше.

• Характер и внутренняя опора
прирождённый авантюрист — создан для риска, открытий и перемен. не любит рутины, не умеет и не хочет жить по расписанию. уверен, что с ним не случится ничего плохого — эта вера защищает и одновременно подводит. рутинная, предсказуемая жизнь буквально гасит его изнутри.

• Отношение к помощи и ожидания от других
помогает широко и щедро — когда захочет и когда это красиво выглядит. не любит брать на себя системные обязательства. от окружающих ожидает принятия его непоследовательности и свободы. попытки встроить его в жёсткие рамки заканчиваются одним — он уходит.`

const tbody = document.getElementById('tbody');
const search = document.getElementById('search');
const cnt = document.getElementById('cnt');
const overlay = document.getElementById('overlay');
let activeMonth = '';

flowers.forEach((f,i) => {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${i+1}</td>
    <td><div class="flower-name"><span>${f.e}</span>${f.name}</div></td>
    <td><div class="date-range">${f.f} — ${f.t}</div></td>
    <td><span class="month-badge">${f.m.map(x=>x[0].toUpperCase()+x.slice(1)).join(' / ')}</span></td>`;
  tr.addEventListener('click', () => {
    document.getElementById('mEmoji').textContent = f.e;
    document.getElementById('mTitle').textContent = f.name;
    document.getElementById('mPeriod').textContent = f.f + ' — ' + f.t;
    document.getElementById('mDesc').textContent = DESC[f.name] || 'Описание не найдено.';
    document.getElementById('mTags').innerHTML = f.tags.map(t=>`<span class="tag">${t}</span>`).join('');
    overlay.classList.add('open');
  });
  tbody.appendChild(tr);
});

function closeModal(){ overlay.classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

function filter(){
  const q = search.value.toLowerCase();
  let n = 0;
  document.querySelectorAll('#tbody tr').forEach((tr,i)=>{
    const f = flowers[i];
    const ok = (!q || f.name.toLowerCase().includes(q) || f.f.includes(q) || f.t.includes(q))
             && (!activeMonth || f.m.includes(activeMonth));
    tr.classList.toggle('hidden', !ok);
    if(ok) n++;
  });
  cnt.textContent = n;
}

search.addEventListener('input', filter);
document.querySelectorAll('.month-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.month-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeMonth = btn.dataset.m;
    filter();
  });
});
</script>
