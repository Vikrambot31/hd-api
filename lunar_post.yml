name: Daily Lunar Post

on:
  schedule:
    # 03:00 Kyiv = 00:00 UTC
    - cron: '0 3 * * *'

  workflow_dispatch:

jobs:
  send-lunar-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send daily lunar post to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python lunar_bot.py